name: test

hosts:
  - name: student-vm
    base_box:
      image: debian-12-x86_64
    flavor: standard.small

  - name: server
    base_box:
      image: debian-12-x86_64
    flavor: standard.small


routers:
  - name: lab-router
    base_box:
      image: debian-12-x86_64
    flavor: standard.small


networks:

  - name: student-net
    cidr: 10.10.10.0/24

  - name: server-net
    cidr: 10.10.20.0/24


net_mappings:

  - host: student-vm
    network: student-net
    ip: 10.10.10.10

  - host: server
    network: server-net
    ip: 10.10.20.10


router_mappings:

  - router: lab-router
    network: student-net
    ip: 10.10.10.1

  - router: lab-router
    network: server-net
    ip: 10.10.20.1


groups:

  - name: user-accessible
    nodes:
      - student-vm

  - name: servers
    nodes:
      - server
